

server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/banking_db}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

app.jwt.secret=${JWT_SECRET:ChangeThisToALongRandomSecretKeyOfAtLeast256BitsForHS256Signing}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${ALLOWED_ORIGINS:*}
