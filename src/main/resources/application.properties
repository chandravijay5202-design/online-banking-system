# ==============================
# Server
# ==============================
server.port=8080

# ==============================
# Database
# ==============================
# --- Default: H2 in-memory (zero setup, resets on restart) ---
spring.datasource.url=jdbc:h2:mem:bankingdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- To use MySQL instead, comment the H2 block above and uncomment below ---
# spring.datasource.url=jdbc:mysql://localhost:3306/banking_db?createDatabaseIfNotExist=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_mysql_password

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==============================
# JWT
# ==============================
# IMPORTANT: replace with your own long random secret before deploying
app.jwt.secret=ChangeThisToALongRandomSecretKeyOfAtLeast256BitsForHS256Signing
app.jwt.expiration-ms=86400000
